<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Barbie GitHub Access</title>
    <style>
        body {
            background-color: #ff85ba;
            background-image: radial-gradient(circle, #ffb6d5 0%, #ff85ba 100%);
            margin: 0;
            display: flex;
            flex-direction: column; /* Coloca os itens um abaixo do outro */
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        img {
            max-width: 350px; /* Define um tamanho menor para a imagem */
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px; /* Espaço entre a imagem e o botão */
        }

        .btn-barbie {
            display: inline-block;
            padding: 15px 35px;
            background-color: #ff1493; /* Rosa Choque */
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            border: 2px solid white;
        }

        .btn-barbie:hover {
            background-color: white;
            color: #ff1493;
            transform: scale(1.1); /* Aumenta um pouco ao passar o mouse */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="imagem/barbie.png" alt="Barbie GitHub">
        
        <br>

        <a href="https://barbie.mattel.com" target="_blank" class="btn-barbie">
            Acessar Site da Barbie
        </a>
    </div>

</body>
</html>
